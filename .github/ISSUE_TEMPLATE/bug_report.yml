name: Bug report
description: Report a bug in pycamtasia
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out the fields below to help us reproduce and fix the issue.

  - type: input
    id: pycamtasia_version
    attributes:
      label: pycamtasia version
      description: Output of `python -c "import camtasia; print(camtasia.__version__)"`
      placeholder: e.g., 0.1.0
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python version
      description: Output of `python --version`
      placeholder: e.g., Python 3.12.1
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g., macOS 14.5, Ubuntu 22.04, Windows 11
    validations:
      required: true

  - type: input
    id: camtasia_version
    attributes:
      label: Camtasia version (if relevant)
      description: Version of the Camtasia desktop app you're producing .cmproj files for
      placeholder: e.g., Camtasia 2024.0.2

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal code or steps that trigger the bug
      placeholder: |
        ```python
        import camtasia
        proj = camtasia.load_project("...")
        # ...
        ```
      render: markdown
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: traceback
    attributes:
      label: Traceback (if applicable)
      render: python

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other information that might help (links to related issues, screenshots, sample files, etc.)
