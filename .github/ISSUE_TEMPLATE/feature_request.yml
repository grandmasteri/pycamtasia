name: Feature request
description: Suggest a new feature or improvement
labels: [enhancement, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe the problem first, then your proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve? What's currently painful or impossible?
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed solution
      description: What would you like to see happen? If possible, sketch out an API.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered workarounds or alternative approaches?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links to related tutorials, Camtasia UI screenshots, similar features in other libraries, etc.
